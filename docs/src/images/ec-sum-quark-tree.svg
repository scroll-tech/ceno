<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a2a2a"/>
    </marker>
    <marker id="arrRoot" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e6091"/>
    </marker>
  </defs>

  <!-- column headers (addresses (b1, b2)) -->
  <text x="120" y="40" text-anchor="middle" font-size="12" font-family="monospace" fill="#666">(b&#8321;, b&#8322;) = (0, 0)</text>
  <text x="280" y="40" text-anchor="middle" font-size="12" font-family="monospace" fill="#666">(0, 1)</text>
  <text x="440" y="40" text-anchor="middle" font-size="12" font-family="monospace" fill="#666">(1, 0)</text>
  <text x="600" y="40" text-anchor="middle" font-size="12" font-family="monospace" fill="#666">(1, 1)</text>

  <!-- row label: c = 1 -->
  <text x="25" y="125" font-size="14" font-style="italic">c = 1</text>
  <text x="25" y="142" font-size="11" fill="#666">(interior)</text>

  <!-- Top row: c = 1 cells -->
  <!-- (1, 0, 0): P_0 + P_1 -->
  <text x="120" y="90" text-anchor="middle" font-size="11" font-family="monospace" fill="#333">v(1, 0, 0)</text>
  <rect x="60" y="100" width="120" height="44" rx="5" fill="#eef5ff" stroke="#333"/>
  <text x="120" y="127" text-anchor="middle" font-size="15">P&#8320; &#8853; P&#8321;</text>

  <!-- (1, 0, 1): P_2 + P_3 -->
  <text x="280" y="90" text-anchor="middle" font-size="11" font-family="monospace" fill="#333">v(1, 0, 1)</text>
  <rect x="220" y="100" width="120" height="44" rx="5" fill="#eef5ff" stroke="#333"/>
  <text x="280" y="127" text-anchor="middle" font-size="15">P&#8322; &#8853; P&#8323;</text>

  <!-- (1, 1, 0): Q (root) -->
  <text x="440" y="90" text-anchor="middle" font-size="11" font-family="monospace" fill="#1e6091" font-weight="bold">v(1, 1, 0)  = Q  (root)</text>
  <rect x="380" y="100" width="120" height="44" rx="5" fill="#d8eac8" stroke="#1e6091" stroke-width="2"/>
  <text x="440" y="127" text-anchor="middle" font-size="15" fill="#1e6091" font-weight="bold">Q</text>

  <!-- (1, 1, 1): unconstrained -->
  <text x="600" y="90" text-anchor="middle" font-size="11" font-family="monospace" fill="#999">v(1, 1, 1)</text>
  <rect x="540" y="100" width="120" height="44" rx="5" fill="#f5f5f5" stroke="#999" stroke-dasharray="5,3"/>
  <text x="600" y="124" text-anchor="middle" font-size="12" fill="#666" font-style="italic">unconstrained</text>
  <text x="600" y="138" text-anchor="middle" font-size="10" fill="#999">(padding)</text>

  <!-- row label: c = 0 -->
  <text x="25" y="305" font-size="14" font-style="italic">c = 0</text>
  <text x="25" y="322" font-size="11" fill="#666">(leaves)</text>

  <!-- Bottom row: c = 0 cells -->
  <!-- (0, 0, 0): P_0 -->
  <text x="120" y="270" text-anchor="middle" font-size="11" font-family="monospace" fill="#333">v(0, 0, 0)</text>
  <rect x="60" y="280" width="120" height="44" rx="5" fill="#fff2e6" stroke="#333"/>
  <text x="120" y="307" text-anchor="middle" font-size="15">P&#8320;</text>

  <!-- (0, 0, 1): P_1 -->
  <text x="280" y="270" text-anchor="middle" font-size="11" font-family="monospace" fill="#333">v(0, 0, 1)</text>
  <rect x="220" y="280" width="120" height="44" rx="5" fill="#fff2e6" stroke="#333"/>
  <text x="280" y="307" text-anchor="middle" font-size="15">P&#8321;</text>

  <!-- (0, 1, 0): P_2 -->
  <text x="440" y="270" text-anchor="middle" font-size="11" font-family="monospace" fill="#333">v(0, 1, 0)</text>
  <rect x="380" y="280" width="120" height="44" rx="5" fill="#fff2e6" stroke="#333"/>
  <text x="440" y="307" text-anchor="middle" font-size="15">P&#8322;</text>

  <!-- (0, 1, 1): P_3 -->
  <text x="600" y="270" text-anchor="middle" font-size="11" font-family="monospace" fill="#333">v(0, 1, 1)</text>
  <rect x="540" y="280" width="120" height="44" rx="5" fill="#fff2e6" stroke="#333"/>
  <text x="600" y="307" text-anchor="middle" font-size="15">P&#8323;</text>

  <!-- Arrows: leaves -> first-layer interiors -->
  <!-- (0,0,0) -> (1,0,0) -->
  <line x1="120" y1="280" x2="120" y2="146" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- (0,0,1) -> (1,0,0) -->
  <line x1="280" y1="280" x2="145" y2="146" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- (0,1,0) -> (1,0,1) -->
  <line x1="440" y1="280" x2="300" y2="146" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- (0,1,1) -> (1,0,1) -->
  <line x1="600" y1="280" x2="325" y2="146" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrows: interiors -> root -->
  <!-- (1,0,0) -> (1,1,0) -->
  <path d="M 175 122 Q 275 80 377 122" fill="none" stroke="#1e6091" stroke-width="1.7" marker-end="url(#arrRoot)"/>
  <!-- (1,0,1) -> (1,1,0) -->
  <path d="M 335 122 Q 380 95 385 122" fill="none" stroke="#1e6091" stroke-width="1.7" marker-end="url(#arrRoot)"/>

  <!-- Legend -->
  <g transform="translate(30, 360)">
    <text x="0" y="0" font-size="13" font-weight="bold">Quark condition (ii):</text>
    <text x="0" y="22" font-size="13" font-family="monospace">v(1, b) = v(b, 0) &#8853; v(b, 1)</text>
    <text x="0" y="42" font-size="12" fill="#666" font-style="italic">applied at every b &#8800; (1, 1); cell v(1, 1, 1) is unconstrained (would be self-referential).</text>
  </g>

  <!-- Footer -->
  <text x="380" y="440" text-anchor="middle" font-size="13" font-style="italic">
    Addresses shown in big-endian (c, b&#8321;, b&#8322;);  root is the address (1, 1, 0) = (1, &#8230;, 1, 0) for n = 2.
  </text>
</svg>
